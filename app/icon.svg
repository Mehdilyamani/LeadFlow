<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="9" fill="#f5f1ec"/>

  <!-- Tower (solid, right, drawn first so house sits on top) -->
  <rect x="34" y="7" width="25" height="45" rx="1" fill="#0f172a"/>
  <!-- Tower windows: 2 cols × 4 rows -->
  <rect x="37" y="11" width="6" height="7" rx="0.5" fill="#f5f1ec"/>
  <rect x="47" y="11" width="6" height="7" rx="0.5" fill="#f5f1ec"/>
  <rect x="37" y="22" width="6" height="7" rx="0.5" fill="#f5f1ec"/>
  <rect x="47" y="22" width="6" height="7" rx="0.5" fill="#f5f1ec"/>
  <rect x="37" y="33" width="6" height="7" rx="0.5" fill="#f5f1ec"/>
  <rect x="47" y="33" width="6" height="7" rx="0.5" fill="#f5f1ec"/>
  <rect x="37" y="44" width="6" height="5" rx="0.5" fill="#f5f1ec"/>
  <rect x="47" y="44" width="6" height="5" rx="0.5" fill="#f5f1ec"/>

  <!-- House body (filled white so it covers the tower overlap) -->
  <rect x="5" y="29" width="26" height="23" fill="#f5f1ec" rx="1"/>
  <!-- House body outline -->
  <rect x="5" y="29" width="26" height="23" stroke="#0f172a" stroke-width="3.5" rx="1"/>
  <!-- House roof -->
  <polyline points="2,30 18,13 36,30" stroke="#0f172a" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 2×2 window (square with cross) -->
  <rect x="10" y="33" width="13" height="13" stroke="#0f172a" stroke-width="2.5" rx="0.5"/>
  <line x1="16.5" y1="33" x2="16.5" y2="46" stroke="#0f172a" stroke-width="2.5"/>
  <line x1="10"   y1="39.5" x2="23" y2="39.5" stroke="#0f172a" stroke-width="2.5"/>

  <!-- Ground line -->
  <line x1="2" y1="53" x2="62" y2="53" stroke="#0f172a" stroke-width="3.5" stroke-linecap="round"/>
</svg>
